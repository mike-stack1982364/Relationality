<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ontological Deception V28</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f7f6fc;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#31275c}
#game{position:fixed;inset:0;width:100%;height:100%;border:0;background:#f7f6fc;visibility:hidden}
#boot{position:fixed;inset:0;display:grid;place-items:center;padding:24px;box-sizing:border-box}
#boot-card{max-width:660px;padding:26px 28px;border:1px solid #d9d4ec;border-radius:18px;background:#fff;text-align:center;box-shadow:0 12px 35px rgba(52,38,99,.08)}
#boot-title{font-weight:850;letter-spacing:.08em;color:#5b3fd6}
#boot-status{margin-top:10px;line-height:1.5;color:#746c91}
#boot-error{display:none;margin-top:12px;padding:10px;border-radius:10px;background:#fff1f3;color:#9f1239;font-size:.78rem;white-space:pre-wrap;text-align:left}
</style>
</head>
<body>
<iframe id="game" title="Ontological Deception"></iframe>
<main id="boot"><section id="boot-card"><div id="boot-title">ONTOLOGICAL DECEPTION · V28</div><div id="boot-status">Loading the relational engine…</div><div id="boot-error" role="alert"></div></section></main>
<script>
(()=>{
'use strict';
const frame=document.getElementById('game'),boot=document.getElementById('boot'),status=document.getElementById('boot-status'),errorBox=document.getElementById('boot-error');
const coreParts=[
  'assets/v20-core-1.b64?v=20260713e',
  'assets/v20-core-2.b64?v=20260713e',
  'assets/v20-core-3.b64?v=20260713e',
  'assets/v20-core-41.b64?v=20260713e',
  'assets/v20-core-42.b64?v=20260713e'
];
const stableModules=[
  'assets/relational-v21-part1.js?v=20260713d',
  'assets/relational-v21-part2.js?v=20260713d',
  'assets/relational-v21-part3.js?v=20260713d',
  'assets/relational-v22-part4a.js?v=20260713b',
  'assets/relational-v22-part4b.js?v=20260713b',
  'assets/relational-v22-part4c.js?v=20260713b',
  'assets/relational-v22-part4d.js?v=20260713e',
  'assets/relational-runtime-budget.js?v=20260713a',
  'assets/relational-v23-visual.js?v=20260713c',
  'assets/relational-v24-layout.js?v=20260713b'
];
const clarityModule='assets/relational-v25-clarity.js?v=20260713b';
const playabilityModule='assets/relational-v26-playability.js?v=20260713b';
const openCanvasModule='assets/relational-v27-open-canvas.js?v=20260713c';
const introModule='assets/relational-v28-intro.js?v=20260713b';
const delay=ms=>new Promise(r=>setTimeout(r,ms));
function fail(e){status.textContent='The game could not initialise.';errorBox.style.display='block';errorBox.textContent=String(e&&e.stack||e);console.error(e)}
async function gunzipBase64(payload){
  if(typeof DecompressionStream!=='function')throw new Error('This browser needs a current Chrome version with native gzip support.');
  const binary=atob(payload),bytes=Uint8Array.from(binary,c=>c.charCodeAt(0));
  const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  return new Response(stream).text();
}
async function waitForBase(){
  const limit=Date.now()+10000;
  while(Date.now()<limit){
    const d=frame.contentDocument,w=frame.contentWindow;
    if(d&&w&&d.getElementById('begin-btn')&&typeof w.runTrial==='function')return d;
    await delay(40);
  }
  throw new Error('The decompressed game did not complete its startup check.');
}
async function fetchText(url){const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error(url+' returned HTTP '+r.status+'.');return r.text()}
async function inject(d,code,label){
  let runtimeError=null;
  const onError=e=>{runtimeError=e.error||new Error(e.message||label+' failed.');e.preventDefault()};
  frame.contentWindow.addEventListener('error',onError);
  try{const s=d.createElement('script');s.dataset.module=label;s.textContent=code;d.head.appendChild(s);await delay(0)}finally{frame.contentWindow.removeEventListener('error',onError)}
  return runtimeError;
}
async function bootGame(){
  try{
    status.textContent='Unpacking the stable game…';
    const coreResponses=await Promise.all(coreParts.map(u=>fetch(u,{cache:'no-store'})));
    const coreFailed=coreResponses.find(r=>!r.ok);if(coreFailed)throw new Error('Stable core returned HTTP '+coreFailed.status+'.');
    const payload=(await Promise.all(coreResponses.map(r=>r.text()))).join('').replace(/\s+/g,'');
    const html=await gunzipBase64(payload);
    if(!html.includes('Build V20')||!html.includes('begin-btn'))throw new Error('Stable base integrity check failed.');
    const loaded=new Promise((resolve,reject)=>{const timer=setTimeout(()=>reject(new Error('Game frame timed out.')),10000);frame.onload=()=>{clearTimeout(timer);resolve()}});
    frame.srcdoc=html;await loaded;const d=await waitForBase();

    status.textContent='Activating the ontological engine…';
    const stableCode=(await Promise.all(stableModules.map(fetchText))).join('\n;\n');
    const stableError=await inject(d,stableCode,'stable-relational-engine');
    if(stableError)throw stableError;
    if(!frame.contentWindow.__RELATIONAL_V21__||!frame.contentWindow.__RELATIONAL_V22__||!frame.contentWindow.__RELATIONAL_RUNTIME_BUDGET__||!frame.contentWindow.__RELATIONAL_V23__||!frame.contentWindow.__RELATIONAL_V24__)throw new Error('Stable relational-engine integrity check failed.');

    status.textContent='Applying the high-clarity visual system…';
    const clarityError=await inject(d,await fetchText(clarityModule),'v25-high-clarity');
    if(clarityError){console.warn('V25 diagnostic audit was recovered:',clarityError)}

    status.textContent='Simulating play, feedback, levels and persistence…';
    const playError=await inject(d,await fetchText(playabilityModule),'v26-playability');
    if(playError)throw playError;
    const smoke=frame.contentWindow.__V26_SMOKE_TEST__;
    if(!frame.contentWindow.__RELATIONAL_V26__||!smoke||!smoke.play||!smoke.feedback||!smoke.next||!smoke.levels||!smoke.persistence||!smoke.highClarity)throw new Error('V26 end-to-end playability check failed.');

    status.textContent='Restoring the open visual answer canvas…';
    const canvasError=await inject(d,await fetchText(openCanvasModule),'v27-open-canvas');
    if(canvasError)console.warn('V27 start-control diagnostic was recovered:',canvasError);

    status.textContent='Restoring the trial introduction…';
    const introError=await inject(d,await fetchText(introModule),'v28-intro');
    if(introError)throw introError;
    const intro=frame.contentWindow.__V28_INTRO_TEST__;
    if(!frame.contentWindow.__RELATIONAL_V28__||!intro||!intro.intro||!intro.start||!intro.returnToIntro)throw new Error('V28 introduction-state check failed.');

    d.title='Ontological Deception V28';document.title='Ontological Deception V28';
    frame.style.visibility='visible';boot.style.display='none';
  }catch(e){fail(e)}
}
bootGame();
})();
</script>
</body>
</html>
