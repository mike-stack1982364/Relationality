<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f6f4fb">
<title>Ontological Deception · Meta-Logic × Meta-Distinction</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#f6f4fb;color:#2d2757;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
#boot{position:fixed;inset:0;display:grid;place-items:center;padding:24px;box-sizing:border-box;background:radial-gradient(circle at 18% -8%,rgba(91,63,219,.08),transparent 34rem),#f6f4fb}
#card{width:min(620px,100%);padding:30px;border:1px solid #d9d5e8;border-radius:20px;background:#fff;text-align:center;box-shadow:0 14px 34px rgba(45,39,87,.08)}
#title{color:#9b6c0a;font-weight:950;letter-spacing:.13em;font-size:clamp(1.45rem,4vw,2.25rem)}
#status{margin-top:13px;color:#6f6888;font-weight:700;line-height:1.5}
#error{display:none;margin-top:16px;padding:12px;border-radius:12px;background:#fff1f5;color:#9f1239;text-align:left;white-space:pre-wrap;font-size:.85rem}
</style>
</head>
<body>
<main id="boot"><section id="card"><div id="title">ONTOLOGICAL DECEPTION</div><div id="status">Loading the foundational meta-logic engine…</div><div id="error" role="alert"></div></section></main>
<script>
(async()=>{
  'use strict';
  const status=document.getElementById('status'),error=document.getElementById('error');
  try{
    if(typeof DecompressionStream!=='function')throw new Error('This build requires a current Chrome, Edge, Firefox or Safari version with native gzip support.');
    const response=await fetch('assets/foundational-meta-logic-v1.b64?v=20260717b',{cache:'no-store'});
    if(!response.ok)throw new Error('Engine payload returned HTTP '+response.status+'.');
    const payload=(await response.text()).replace(/\s+/g,'');
    const bytes=Uint8Array.from(atob(payload),character=>character.charCodeAt(0));
    const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    if(!html.includes('Foundational rule stream')||!html.includes('auditGenerator'))throw new Error('Engine integrity check failed.');
    document.open();document.write(html);document.close();
  }catch(reason){
    status.textContent='The game could not initialise.';
    error.style.display='block';
    error.textContent=String(reason&&reason.stack||reason);
    console.error(reason);
  }
})();
</script>
</body>
</html>
